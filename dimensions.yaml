# Eval Configuration
# Agent to evaluate (find ID in Agent Builder URL: /admin/agents/{agentId})
agent_id: your-target-agent-id

# Evaluation Dimensions
# Each dimension gets its own judge call for isolated, accurate scoring.
# Add, remove, or edit dimensions to match your evaluation criteria.
#
# Fields:
#   id          — unique identifier (snake_case, used for XML tag parsing)
#   name        — display name (shown in output CSV)
#   description — what the judge evaluates (be specific)
#   scale       — ordered list of score options (judge picks one)
#
# Available dimensions:
#
#   | Dimension          | Description                                                       | Scale                                        |
#   |--------------------|-------------------------------------------------------------------|----------------------------------------------|
#   | Response Quality   | Is the output well-structured, concise, and actionable?           | full, substantial, partial, minimal, failure |
#   | Groundedness       | Are claims supported by documents the agent actually retrieved?   | full, substantial, partial, minimal, failure |
#   | Hallucination Risk | Does the response assert specific details without source backing? | low, medium, high                            |
#   | Factual Accuracy   | Are specific claims true according to current company data?       | full, substantial, partial, minimal, failure |
#
# Only Response Quality and Groundedness are enabled by default.
# Uncomment or add others as needed.

dimensions:
  - id: response_quality
    name: Response Quality
    description: >
      Is the output well-structured, concise, and actionable?
      Consider formatting, completeness, and whether it directly
      addresses the request. Evaluate presentation, not factual correctness.
    scale:
      - full
      - substantial
      - partial
      - minimal
      - failure

  - id: groundedness
    name: Groundedness
    description: >
      Are the response's claims supported by the documents the agent
      actually retrieved? Use Glean Search to check whether key claims
      can be traced to indexed company documents.
    scale:
      - full
      - substantial
      - partial
      - minimal
      - failure

  # - id: hallucination_risk
