agent_id: your-target-agent-id
agent_description: >
  Describe what this agent does, what a good response looks like,
  and any important constraints or formatting expectations.
dimensions:
  - id: response_quality
    name: Response Quality
    description: >
      Is the output well-structured, concise, and actionable?
      Evaluate presentation, not factual correctness.
    scale: [full, substantial, partial, minimal, failure]
  - id: groundedness
    name: Groundedness
    description: >
      Are the response's claims supported by documents the agent retrieved?
      Use Glean Search to verify key claims.
    scale: [full, substantial, partial, minimal, failure]
