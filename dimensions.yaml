# Agent to evaluate (find ID in Agent Builder URL: /admin/agents/{agentId})
agent_id: your-target-agent-id

# Evaluation dimensions — each gets its own isolated judge call.
dimensions:
  - id: response_quality
    name: Response Quality
    description: >
      Is the output well-structured, concise, and actionable?
      Evaluate presentation, not factual correctness.
    scale: [full, substantial, partial, minimal, failure]

  - id: groundedness
    name: Groundedness
    description: >
      Are the response's claims supported by documents the agent retrieved?
      Use Glean Search to verify key claims.
    scale: [full, substantial, partial, minimal, failure]

  # - id: hallucination_risk
  #   name: Hallucination Risk
  #   description: Does the response assert specific details without source backing?
  #   scale: [low, medium, high]

